name: Threat Intel Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # manual trigger from GitHub UI

# Prevent concurrent runs from writing to the DB simultaneously
concurrency:
  group: threat-intel-pipeline
  cancel-in-progress: false

jobs:

  # ---------------------------------------------------------------------------
  # Stage 1 — Feed ingestion
  # ---------------------------------------------------------------------------
  ingest:
    name: Stage 1 — Ingest feeds
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingestion
        run: python threat_intel_ingestion.py
        env:
          OTX_API_KEY: ${{ secrets.OTX_API_KEY }}

      - name: Print pending count
        run: python threat_intel_ingestion.py --pending

      - name: Commit raw database to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add threat_intel.db
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "chore: update raw database [skip ci]"
          git push

      # Pass DB to Stage 2 via artifact
      - name: Upload raw DB for Stage 2
        uses: actions/upload-artifact@v4
        with:
          name: raw-db
          path: threat_intel.db
          retention-days: 1


  # ---------------------------------------------------------------------------
  # Stage 2 — Claude analysis
  # ---------------------------------------------------------------------------
  analyse:
    name: Stage 2 — Analyse with Claude
    runs-on: ubuntu-latest
    needs: ingest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Pull the latest commit from Stage 1 so we have the updated raw DB
      - name: Pull latest changes from Stage 1
        run: git pull --rebase

      # Download the raw DB written by Stage 1 (includes pending status updates)
      - name: Download raw DB from Stage 1
        uses: actions/download-artifact@v4
        with:
          name: raw-db

      - name: Run analysis
        run: python threat_intel_analysis.py --limit 50
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit both databases to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add threat_intel.db threat_intel_analysed.db
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "chore: update databases [skip ci]"
          git push

      # Upload both DBs as artifacts for download and inspection
      - name: Upload databases as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: threat-intel-databases
          path: |
            threat_intel.db
            threat_intel_analysed.db
          retention-days: 7
